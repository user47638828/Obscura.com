<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obscura · For You</title>

  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="feed.css">
</head>
<body>

  <main class="feed-container">
    <header class="feed-header">
      <h2>For You</h2>
      <button id="logout-btn">Logout</button>
    </header>

    <section id="feed">
      <div class="post">
        <p class="post-text">Willkommen bei Obscura.</p>
        <div class="post-meta">
          <span>❤️ 0</span>
          <span>💬 0</span>
        </div>
      </div>

      <div class="post">
        <p class="post-text">Der Feed ist bereit für echte Posts.</p>
        <div class="post-meta">
          <span>❤️ 0</span>
          <span>💬 0</span>
        </div>
      </div>
    </section>
  </main>

  <nav class="bottom-nav">
    <button onclick="location.href='search.html'">🔍</button>
    <button class="active" onclick="location.href='feed.html'">🏠</button>
    <button onclick="location.href='profile.html'">👤</button>
  </nav>

  <script type="module" src="feed-manager.js"></script>
</body>
</html>
