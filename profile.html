<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obscura · Profil</title>

  <link rel="stylesheet" href="global.css">
  <link rel="stylesheet" href="profile.css">
</head>
<body>

  <main class="profile">

    <section class="profile-card">
      <div class="profile-row">
        <h1 id="profile-username"></h1>
        <button id="edit-name" class="edit-btn">Edit</button>
      </div>

      <div class="profile-row">
        <p id="profile-bio"></p>
        <button id="edit-bio" class="edit-btn">Edit</button>
      </div>

      <div class="profile-stats">
        <div><span id="profile-level"></span><small>Level</small></div>
        <div><span id="profile-xp"></span><small>XP</small></div>
        <div><span id="profile-likes"></span><small>Likes</small></div>
        <div><span id="profile-comments"></span><small>Kommentare</small></div>
        <div><span id="profile-followers"></span><small>Follower</small></div>
        <div><span id="profile-following"></span><small>Folgt</small></div>
      </div>

      <button id="follow-btn" class="follow-btn">Follow</button>
    </section>

    <section id="create-post" class="create-post">
      <textarea id="post-input" placeholder="Was denkst du gerade?"></textarea>
      <button id="post-btn">Posten</button>
    </section>

    <section class="profile-posts">
      <h3>Posts</h3>
      <div id="posts"></div>
    </section>

  </main>

  <nav class="bottom-nav">
    <button onclick="location.href='search.html'">🔍</button>
    <button onclick="location.href='feed.html'">🏠</button>
    <button class="active" onclick="location.href='profile.html'">👤</button>
  </nav>

  <script type="module" src="profile.js"></script>
</body>
</html>
